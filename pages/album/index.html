<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="../../">
  <title>Studio Midnight | 앨범 상세</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/common.css?v=20260724-album-paging8" />
  <link rel="stylesheet" href="pages/album/page.css?v=20260724-album-paging8" />
</head>
<body class="bg-zinc-950 p-4 md:p-8" data-current-page="album">
  <section class="w-full">
    <div id="common-root"></div>
  </section>
  <script src="js/trackit-data.js?v=20260724-album-paging8"></script>
  <script src="js/trackit-pages.js?v=20260724-album-paging8"></script>
  <script src="pages/album/album.js?v=20260724-album-paging8"></script>
  <script>
    async function loadCommonHtml() {
      const response = await fetch(new URL("common.html?v=20260724-album-paging8", document.baseURI).href, { cache: "no-store" });
      if (!response.ok) {
        console.error("공통 레이아웃을 불러오지 못했습니다.", response.status);
        return;
      }
      const html = await response.text();
      document.getElementById("common-root").innerHTML = html;
      const slot = document.querySelector("[data-common-page-slot]");
      if (slot) {
        const pageRoot = document.createElement("section");
        pageRoot.className = "page active space-y-6";
        pageRoot.dataset.pageRoot = "";
        slot.appendChild(pageRoot);
      }
      const appScript = document.createElement("script");
      appScript.src = "js/trackit-app.js?v=20260724-album-paging8";
      appScript.async = false;
      appScript.addEventListener("load", () => {
        if (document.readyState !== "loading" && typeof bootTrackit === "function") {
          bootTrackit();
        }
      });
      document.body.appendChild(appScript);
    }
    loadCommonHtml();
  </script>
</body>
</html>
