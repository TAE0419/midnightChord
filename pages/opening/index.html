<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="../../" />
  <title>Studio Midnight</title>
  <link rel="stylesheet" href="pages/opening/page.css" />
</head>

<body>
  <main class="opening" aria-labelledby="opening-title">
    <canvas class="opening-signal" data-opening-canvas aria-hidden="true"></canvas>
    <div class="opening-frame" aria-hidden="true"></div>
    <div class="opening-corner opening-corner-top" aria-hidden="true"></div>
    <div class="opening-corner opening-corner-bottom" aria-hidden="true"></div>
    <header class="opening-header">
      <p class="opening-status">EST. 2026 · LISTENING ROOM</p>
      <p class="opening-live"><span></span> LIVE SIGNAL</p>
    </header>

    <div class="opening-record" data-opening-record aria-hidden="true">
      <span class="opening-record-ring ring-one"></span>
      <span class="opening-record-ring ring-two"></span>
      <span class="opening-record-ring ring-three"></span>
      <span class="opening-record-label">SM<br><small>001</small></span>
    </div>

    <section class="opening-center" data-opening-stage>
      <p class="opening-eyebrow">MIDNIGHT FREQUENCY / 01</p>
      <div class="opening-mark" data-opening-wave aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="opening-logo-wrap">
        <img class="opening-logo" src="assets/images/logo.png" alt="Studio Midnight" />
      </div>
      <h1 id="opening-title" class="sr-only">Studio Midnight</h1>
      <p class="opening-copy">오늘의 밤을 위한 사운드를 준비하고 있습니다.</p>
      <section class="opening-track" aria-label="현재 재생할 추천 음악">
        <div class="opening-track-heading">
          <span>NOW PLAYING</span>
          <button class="opening-sound" type="button" data-opening-sound aria-label="미리듣기 재생" title="미리듣기 재생">
            <span data-opening-sound-icon>▶</span>
          </button>
        </div>
        <div class="opening-track-body">
          <div class="opening-equalizer" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
          <div><p class="opening-track-title">9 Lives</p><p class="opening-track-artist">Anna Stefanie</p></div>
          <span class="opening-track-time" data-opening-track-time>00:00</span>
        </div>
        <div class="opening-track-progress" aria-hidden="true"><span data-opening-progress></span></div>
      </section>
      <button class="opening-enter" type="button" data-opening-enter>
        <span>입장하기</span>
        <span aria-hidden="true">→</span>
      </button>
    </section>

    <div class="opening-footer">
      <div><span class="opening-footer-label">NEXT</span><span data-opening-countdown>06</span></div>
      <div><span class="opening-footer-label">DESTINATION</span><span>HOME</span></div>
    </div>
  </main>
  <audio data-opening-audio preload="metadata" src="pages/browse/audio/Anna Stefanie - 9 Lives.mp3"></audio>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="pages/opening/opening.js"></script>
</body>

</html>
