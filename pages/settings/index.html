<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="../../">
  <title>Studio Midnight | 설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="pages/settings/page.css" />
</head>
<body class="bg-zinc-950 p-4 md:p-8" data-current-page="settings">
  <section class="w-full">
    <div id="common-root"></div>
  </section>
  <script src="js/trackit-data.js"></script>
  <script src="pages/settings/settings.js"></script>
  <script>
    async function loadCommonHtml() {
      const response = await fetch(new URL("common.html", document.baseURI).href);
      if (!response.ok) {
        console.error("공통 페이지를 불러오지 못했습니다.", response.status);
        return;
      }
      const html = await response.text();
      document.getElementById("common-root").innerHTML = html;
      const slot = document.querySelector("[data-common-page-slot]");
      if (slot) {
        const pageRoot = document.createElement("section");
        pageRoot.className = "page active space-y-6";
        pageRoot.dataset.pageRoot = "";
        slot.appendChild(pageRoot);
      }
      const appScript = document.createElement("script");
      appScript.src = "js/trackit-app.js";
      appScript.async = false;
      appScript.addEventListener("load", () => {
        if (typeof bootTrackit === "function") {
          if (document.readyState !== "loading") {
            bootTrackit();
          } else {
            document.addEventListener("DOMContentLoaded", bootTrackit);
          }
        }
      });
      document.body.appendChild(appScript);
    }
    loadCommonHtml();
  </script>
</body>
</html>
